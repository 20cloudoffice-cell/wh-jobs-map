const countryFlag = {
  "オーストラリア": "🇦🇺",
  "カナダ": "🇨🇦",
  "ニュージーランド": "🇳🇿",
};

const workTypeTag = {
  "フルタイム": "tag-full",
  "パートタイム": "tag-part",
  "カジュアル": "tag-casual",
};

function renderCards(data) {
  const grid = document.getElementById('grid');
  document.getElementById('result-count').textContent = `${data.length} 件表示中`;

  if (data.length === 0) {
    grid.innerHTML = '<div class="no-results">条件に合う仕事が見つかりませんでした。</div>';
    return;
  }

  grid.innerHTML = data.map((j, i) => {
    const flag = countryFlag[j.country] || '🌍';
    const tagClass = workTypeTag[j.workType] || '';
    const applyLen = j.howToApply.length;

    return `
    <div class="card">
      <div class="card-header">
        <div class="card-title">${j.company}</div>
        <div class="card-location">
          <span class="flag">${flag}</span>
          ${j.country} &nbsp;›&nbsp; ${j.city}
        </div>
      </div>
      <div class="card-body">
        <div class="wage-badge">💴 ${j.wage}</div>
        <div class="info-row">
          <span class="info-label">勤務形態</span>
          <span class="info-value"><span class="tag ${tagClass}">${j.workType}</span></span>
        </div>
        <div class="info-row">
          <span class="info-label">英語レベル</span>
          <span class="info-value">${j.english}</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="info-row" style="margin-bottom:4px">
          <span class="info-label">応募方法</span>
        </div>
        <div class="apply-detail ${applyLen < 80 ? 'short' : ''}" data-idx="${i}" onclick="toggleExpand(this)">${j.howToApply}</div>
      </div>
    </div>
    `;
  }).join('');
}

function toggleExpand(el) {
  if (el.classList.contains('short')) return;
  el.classList.toggle('expanded');
}

  const country = document.getElementById('filter-country').value;
  const city = document.getElementById('filter-city').value;
  const type = document.getElementById('filter-type').value;
  const english = document.getElementById('filter-english').value;

  return raw.filter(j => {
    if (country && j.country !== country) return false;
    if (city && j.city !== city) return false;
    if (type && j.workType !== type) return false;
    if (english && j.english !== english) return false;
    if (search) {
      const hay = (j.company + j.city + j.country + j.howToApply + j.wage).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function applyFilters() {
  renderCards(getFiltered());
}

function resetFilters() {
  document.getElementById('search').value = '';
  document.getElementById('filter-country').value = '';
  document.getElementById('filter-city').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('filter-english').value = '';
  updateCityOptions();
  applyFilters();
}

function updateCityOptions() {
  const selectedCountry = document.getElementById('filter-country').value;
  const cities = [...new Set(
    raw.filter(j => !selectedCountry || j.country === selectedCountry).map(j => j.city)
  )].sort();
  const citySelect = document.getElementById('filter-city');
  const current = citySelect.value;
  citySelect.innerHTML = '<option value="">すべての都市</option>' +
    cities.map(c => `<option value="${c}"${c === current ? ' selected' : ''}>${c}</option>`).join('');
}

// Init
const countries = [...new Set(raw.map(j => j.country))].sort();
const countrySelect = document.getElementById('filter-country');
countries.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = (countryFlag[c] || '🌍') + ' ' + c;
  countrySelect.appendChild(o);
});

const englishLevels = [...new Set(raw.map(j => j.english))].sort();
const englishSelect = document.getElementById('filter-english');
englishLevels.forEach(e => {
  const o = document.createElement('option');
  o.value = e; o.textContent = e;
  englishSelect.appendChild(o);
});

updateCityOptions();

// Stats
document.getElementById('stat-total').innerHTML = `全 <strong>${raw.length}</strong> 件`;
document.getElementById('stat-countries').innerHTML = `対象国 <strong>${countries.length}</strong> か国`;
const allCities = [...new Set(raw.map(j => j.city))];
document.getElementById('stat-cities').innerHTML = `都市数 <strong>${allCities.length}</strong> 都市`;

// Event listeners
document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('filter-country').addEventListener('change', () => { updateCityOptions(); applyFilters(); });
document.getElementById('filter-city').addEventListener('change', applyFilters);
document.getElementById('filter-type').addEventListener('change', applyFilters);
document.getElementById('filter-english').addEventListener('change', applyFilters);

renderCards(raw);
</script>
</body>
</html>
