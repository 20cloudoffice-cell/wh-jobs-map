  { country:"オーストラリア", city:"メルボルン", company:"Robert Spaulding Advertising（バリスタ）", contributor:"もちみゆ", wage:"平日 $32.34 / 土日 $38.78 / 祝日 $64.45", workType:"カジュアル", english:"Intermediate", requirements:"FacebookのBarista Melbourneグループでプロフィールを投稿。\n\n✅確認されるスキル\n・バリスタのスキルがあるか\n\n週4日、6:30〜15:30", lat:-37.9490, lng:145.0020 },
];

const countryFlag = { "オーストラリア":"🇦🇺", "カナダ":"🇨🇦", "ニュージーランド":"🇳🇿" };
const workTypeTag = { "フルタイム":"tag-full", "パートタイム":"tag-part", "カジュアル":"tag-casual" };

let map, markers = [], infoWindow;

function initMap() {
  map = new google.maps.Map(document.getElementById('map'), {
    center: { lat: -25, lng: 133 },
    zoom: 4,
    mapTypeControl: false,
    streetViewControl: false,
  });

  infoWindow = new google.maps.InfoWindow({ maxWidth: 440 });

  // フィルターの選択肢を生成
  const countries = [...new Set(jobs.map(j => j.country))].sort();
  const countrySelect = document.getElementById('filter-country');
  countries.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = (countryFlag[c] || '🌍') + ' ' + c;
    countrySelect.appendChild(o);
  });

  renderMarkers(jobs);
}

function renderMarkers(data) {
  markers.forEach(m => m.setMap(null));
  markers = [];

  document.getElementById('count-bar').textContent = `${data.length} 件表示中`;

  data.forEach(job => {
    const marker = new google.maps.Marker({
      position: { lat: job.lat, lng: job.lng },
      map,
      title: job.company,
      icon: {
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: job.workType === 'フルタイム' ? '#22c55e' : job.workType === 'パートタイム' ? '#3b82f6' : '#f59e0b',
        fillOpacity: 0.9,
        strokeColor: 'white',
        strokeWeight: 2,
      }
    });

    marker.addListener('click', () => {
      const tag = workTypeTag[job.workType] || '';
      const flag = countryFlag[job.country] || '🌍';
      const reqHtml = (job.requirements || '').replace(/\n/g, '<br>');
      const wageHtml = (job.wage || '').replace(/\n/g, '<br>');
      const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(job.company + ' ' + job.city)}`;
      const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(job.company + ' ' + job.city)}`;
      infoWindow.setContent(`
        <div class="iw-wrap">
          <div class="iw-title">${job.company}</div>
          <div class="iw-location">${flag} ${job.country} › ${job.city}</div>
          ${job.contributor ? `<div class="iw-contributor">👤 情報提供: ${job.contributor}</div>` : '<div class="iw-contributor">👤 情報提供者不明</div>'}
          <table class="iw-table">
            <tr>
              <td class="iw-label">💰 時給</td>
              <td class="iw-value">${wageHtml}</td>
            </tr>
            <tr>
              <td class="iw-label">💼 勤務形態</td>
              <td class="iw-value"><span class="iw-tag ${tag}">${job.workType || '−'}</span></td>
            </tr>
            <tr>
              <td class="iw-label">🗣 英語レベル</td>
              <td class="iw-value">${job.english || '−'}</td>
            </tr>
          </table>
          <div class="iw-links">
            <a class="iw-link-btn iw-link-maps" href="${mapsUrl}" target="_blank">📍 Googleマップで見る</a>
            <a class="iw-link-btn iw-link-search" href="${searchUrl}" target="_blank">🔍 お店を検索</a>
          </div>
          <div class="iw-section">
            <div class="iw-section-label">📋 採用・仕事内容</div>
            <div class="iw-requirements">${reqHtml || '情報なし'}</div>
          </div>
        </div>
      `);
      infoWindow.open(map, marker);
    });

    markers.push(marker);
  });

  // 表示データに合わせてマップをフィット
  if (data.length > 0) {
    const bounds = new google.maps.LatLngBounds();
    data.forEach(job => bounds.extend({ lat: job.lat, lng: job.lng }));
    map.fitBounds(bounds);
  }
}

function getFiltered() {
  const country = document.getElementById('filter-country').value;
  const city = document.getElementById('filter-city').value;
  const type = document.getElementById('filter-type').value;
  const search = document.getElementById('search').value.toLowerCase();

  return jobs.filter(j => {
    if (country && j.country !== country) return false;
    if (city && j.city !== city) return false;
    if (type && j.workType !== type) return false;
    if (search) {
      const hay = (j.company + j.city + j.country + (j.requirements||'') + j.wage + (j.contributor||'')).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });
}

function applyFilters() {
  updateCityOptions();
  renderMarkers(getFiltered());
}

function updateCityOptions() {
  const selectedCountry = document.getElementById('filter-country').value;
  const cities = [...new Set(
    jobs.filter(j => !selectedCountry || j.country === selectedCountry).map(j => j.city)
  )].sort();
  const citySelect = document.getElementById('filter-city');
  const current = citySelect.value;
  citySelect.innerHTML = '<option value="">すべての都市</option>' +
    cities.map(c => `<option value="${c}"${c === current ? ' selected' : ''}>${c}</option>`).join('');
}

function resetFilters() {
  document.getElementById('filter-country').value = '';
  document.getElementById('filter-city').value = '';
  document.getElementById('filter-type').value = '';
  document.getElementById('search').value = '';
  updateCityOptions();
  renderMarkers(jobs);
}

// 凡例
window.addEventListener('load', () => {
  const legend = document.createElement('div');
  legend.style.cssText = 'background:white;padding:8px 12px;margin:8px;border-radius:8px;font-size:0.75rem;box-shadow:0 1px 4px rgba(0,0,0,0.15);line-height:1.8;';
  legend.innerHTML = `
    <strong>凡例</strong><br>
    <span style="color:#22c55e">●</span> フルタイム
    <span style="color:#3b82f6">●</span> パートタイム
    <span style="color:#f59e0b">●</span> カジュアル
  `;
  map.controls[google.maps.ControlPosition.BOTTOM_LEFT].push(legend);
});
</script>

<script>
// Googleマップのエラーをページ上に表示
window.gm_authFailure = function() {
  document.getElementById('map').innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;color:red;font-size:18px;gap:12px"><strong>認証エラー (gm_authFailure)</strong><p>APIキーが無効か、請求が有効でないか、APIが無効です。</p></div>';
};
window.addEventListener('error', function(e) {
  if (e.message && e.message.includes('google')) {
    document.getElementById('map').innerHTML = '<div style="padding:20px;color:red">JSエラー: ' + e.message + '</div>';
  }
});
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDAK2pNYknXR1KOgFC-YypNDOaLDYR3UNo&callback=initMap&language=ja" async defer></script>
